name: Weekly HMRC Data Snapshot

on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    services:
      qdrant:
        image: qdrant/qdrant
        ports:
          - 6333:6333
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get Current Date
        id: date
        run: echo "today=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install Dependencies
        run: uv sync --project backend

      - name: Cache HMRC Raw Data
        id: cache-raw-data
        uses: actions/cache@v4
        with:
          path: |
            backend/data/raw_json
            backend/data/discovery_cache.json
          key: hmrc-raw-data-${{ github.run_id }}
          restore-keys: |
            hmrc-raw-data-

      - name: Cache Ollama Models
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-models-${{ runner.os }}-nomic-embed-text
          restore-keys: |
            ollama-models-${{ runner.os }}-

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve & 
          timeout 60s bash -c "until curl -s http://localhost:11434/api/tags; do sleep 2; done"
          ollama pull nomic-embed-text

      - name: Download Previous Snapshot
        uses: dsaltares/fetch-gh-release-asset@1.1.2
        with:
          version: 'latest'
          file: 'hmrc_data.snapshot'
          target: 'backend/data/hmrc_data.snapshot'
        continue-on-error: true

      - name: Download Raw JSON Seed (Onetime)
        if: steps.cache-raw-data.outputs.cache-hit != 'true'
        uses: dsaltares/fetch-gh-release-asset@1.1.2
        with:
          version: 'tags/v1.0.0'
          file: 'raw_json.zip'
          target: 'backend/data/raw_json.zip'
        continue-on-error: true

      - name: Unzip Raw JSON Seed
        if: steps.cache-raw-data.outputs.cache-hit != 'true'
        run: |
          if [ -f backend/data/raw_json.zip ]; then
            mkdir -p backend/data/raw_json
            unzip -o backend/data/raw_json.zip -d backend/data/raw_json/
            rm backend/data/raw_json.zip
          fi

      - name: Update Data and Export Snapshot
        run: |
          if [ -f backend/data/hmrc_data.snapshot ]; then
            make import-data
          fi
          make update
          make export-data

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: data-${{ steps.date.outputs.today }}
          name: "HMRC Legislation Snapshot - ${{ steps.date.outputs.today }}"
          body: |
            Automated weekly refresh of HMRC Internal Manuals.
            - Updated on: ${{ steps.date.outputs.today }}
          files: backend/data/hmrc_data.snapshot
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}